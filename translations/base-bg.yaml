    play: Играй
    edit: Редакция
    title: Режим Пъзели
    createPuzzle: Създай пъзел
    loadPuzzle: Зареди
    reviewPuzzle: Преглед и публикуване
    validatingPuzzle: Валидиране на пъзел
    submittingPuzzle: Публикуване на пъзел
    noPuzzles: В момента няма пъзели в тази секция.
    dlcHint: Купихте DLC-то? Уверете се, че е активирано, като щракнете с десния бутон
        върху shapez в библиотеката си и изберете Properties > DLCs.

    categories:
        levels: Нива
        new: Нови
        top-rated: Най-високо оценени
        mine: Създадени
        easy: Лесно
        medium: Средно
        hard: Трудно
