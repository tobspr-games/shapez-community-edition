        премахнете, свържете се с support@shapez.io!
    no-permission: Нямате разрешение да извършите това действие.

tips:
    - Централата приема всеки вход, не само текущата форма!
    - Уверете се, че фабриките ви са модулни - ще си заслужава!
    - Не строете твърде близо до Централата, иначе ще стане хаос!
    - Ако стакването не работи, опитайте да размените входовете.
    - Можете да смените посоката на планирането на ленти с <b>R</b>.
    - Задържането на <b>CTRL</b> позволява влачене на ленти без авто-ориентация.
    - Съотношенията остават същите, стига всички подобрения да са на едно ниво.
    - Последователното изпълнение е по-ефективно от паралелното.
    - По-късно в играта ще отключите още варианти на сгради!
    - Можете да използвате <b>T</b>, за да сменяте различните варианти.
    - Симетрията е ключът!
    - Можете да преплитате различни нива тунели.
    - Опитайте да строите компактни фабрики - ще си заслужава!
    - Бояджията има огледален вариант, който може да изберете с <b>T</b>
    - Правилните съотношения на сградите максимизират ефективността.
    - На максимално ниво 5 екстрактора запълват една лента.
    - Не забравяйте за тунелите!
    - Не е нужно да разделяте предметите равномерно за пълна ефективност.
    - Задържането на <b>SHIFT</b> активира планирането на ленти и улеснява
      поставянето на дълги линии.
    - Резачките винаги режат вертикално, независимо от ориентацията си.
    - Смесете и трите основни цвята, за да получите бяло.
    - Буферът на склада приоритизира левия изход.
    - Инвестирайте време в повтаряеми дизайни - заслужава си!
    - Задържането на <b>SHIFT</b> ви позволява да поставяте по няколко сгради.
    - Можете да задържите <b>ALT</b>, за да обърнете посоката на лентите.
    - Ефективността е ключът!
    - Полетата с форми по-далеч от Централата са по-сложни.
    - Машините имат ограничена скорост, разделяйте потоците за максимална
      ефективност.
    - Използвайте балансери, за да увеличите ефективността си.
    - Организацията е важна. Опитайте да не пресичате твърде много конвейери.
    - Планирайте предварително, иначе ще стане хаос!
    - Не премахвайте старите си фабрики! Ще ви трябват за отключване на
      подобрения.
    - Опитайте да минете ниво 20 или 26 сами, преди да търсите помощ!
    - Не усложнявайте, опитайте се да останете семпли и ще стигнете далеч.
    - Може да се наложи да използвате фабрики повторно по-късно в играта.
      Изграждайте ги така, че да могат да се преизползват.
    - Понякога може да намерите нужната форма на картата, без да я създавате със
      стакери.
    - Пълни вятърни мелници/пинууили никога не се появяват естествено.
    - Оцветявайте формите преди рязане за максимална ефективност.
    - С модулите пространството е само възприятие; грижа за смъртните хора.
    - Направете отделна фабрика за чертежи. Те са важни за модулите.
    - Погледнете по-внимателно смесителя за цветове и въпросите ви ще получат
      отговор.
    - Използвайте <b>CTRL</b> + клик за избор на зона.
    - Строенето твърде близо до Централата може да попречи на по-късни проекти.
    - Иконата за закачане до всяка форма в списъка с подобрения я закрепя на
      екрана.
    - Смесете и трите основни цвята, за да получите бяло!
