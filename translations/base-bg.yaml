        За инсталиране и управление на модове, копирайте ги в папката с модове
        (използвайте бутона 'Отвори папката с модове'). След това рестартирайте
        играта, иначе модовете няма да се покажат.

settings:
    title: Настройки
    categories:
        general: Общи
        userInterface: Потребителски интерфейс
        advanced: Разширени
        performance: Производителност

    versionBadges:
        dev: Разработка
        staging: Тестова
        prod: Продукция
    buildDate: Компилирано на <at-date>
    tickrateHz: <amount> Hz
    rangeSliderPercentage: <amount> %
    newBadge: Ново!

    labels:
        uiScale:
            title: Мащаб на интерфейса
            description: >-
                Променя размера на потребителския интерфейс. Интерфейсът все пак ще се
                мащабира според резолюцията на устройството ви, но тази настройка
                контролира степента на мащабиране.
            scales:
                super_small: Много малък
                small: Малък
                regular: Нормален
                large: Голям
                huge: Огромен

        autosaveInterval:
            title: Интервал за автозапазване
            description: >-
                Определя колко често играта се запазва автоматично. Можете и напълно да
                го изключите оттук.

            intervals:
                one_minute: 1 минута
                two_minutes: 2 минути
                five_minutes: 5 минути
                ten_minutes: 10 минути
                twenty_minutes: 20 минути
                disabled: Изключено

        scrollWheelSensitivity:
            title: Чувствителност на мащабирането
            description: >-
                Променя чувствителността на мащабирането (колелце на мишката или
                тъчпад).
            sensitivity:
                super_slow: Много бавно
                slow: Бавно
                regular: Нормално
                fast: Бързо
                super_fast: Много бързо

        movementSpeed:
            title: Скорост на движение
            description: >-
                Променя колко бързо се движи изгледът при използване на клавиатурата или
                при преместване на мишката до краищата на екрана.
            speeds:
                super_slow: Много бавно
                slow: Бавно
                regular: Нормално
                fast: Бързо
                super_fast: Много бързо
                extremely_fast: Изключително бързо

        language:
            title: Език
            description: >-
                Смени езика. Всички преводи са създадени от потребители и може да са
                непълни!

        enableColorBlindHelper:
            title: Режим за далтонисти
            description: >-
                Включва различни инструменти, които ви позволяват да играете, ако сте
                далтонист.

        fullscreen:
            title: Цял екран
            description: >-
                Препоръчително е да играете на цял екран за най-добро изживяване.
                Достъпно само в пълната версия.

        soundsMuted:
            title: Заглуши звуците
            description: >-
                Ако е включено, заглушава всички звукови ефекти.

        musicMuted:
            title: Заглуши музиката
            description: >-
                Ако е включено, заглушава цялата музика.

        soundVolume:
            title: Сила на звука
            description: >-
                Задава силата на звуковите ефекти

        musicVolume:
            title: Сила на музиката
            description: >-
                Задава силата на музиката

        theme:
            title: Тема на играта
            description: >-
                Изберете тема на играта (светла / тъмна).
            themes:
                dark: Тъмна
                light: Светла

        refreshRate:
            title: Tick честота
            description: >-
                Определя колко игрови тика се случват в секунда. По-висока честота
                обикновено означава по-добра точност, но и по-слаба производителност.
                При по-ниски честоти потокът може да не е точен. Над 60 Hz се очаква
                забавяне!

        alwaysMultiplace:
            title: Множествено поставяне
            description: >-
                Ако е включено, всички сгради остават избрани след поставяне, докато не
                го отмените. Това е еквивалент на постоянно задържан SHIFT.

        offerHints:
            title: Подсказки и уроци
            description: >-
                Дали да се предлагат подсказки и уроци по време на игра. Също така
                скрива определени UI елементи до дадено ниво, за да е по-лесно влизането
                в играта.

        enableTunnelSmartplace:
            title: Умни тунели
            description: >-
                Когато е включено, поставянето на тунели автоматично премахва ненужните
                ленти. Позволява и плъзгане на тунели, като излишните се премахват.

        vignette:
            title: Винетка
            description: >-
                Включва винетката, която потъмнява ъглите на екрана и прави текста
                по-лесен за четене.

        rotationByBuilding:
            title: Ротация по тип сграда
            description: >-
                Всеки тип сграда запомня последно зададената му ротация поотделно. Това
                може да е по-удобно, ако често сменяте различни типове сгради.

        compactBuildingInfo:
            title: Компактна информация за сградите
            description: >-
                Съкращава информационните полета за сградите, като показва само
                съотношенията им. В противен случай се показват описание и изображение.

        disableCutDeleteWarnings:
            title: Изключи предупрежденията за изрязване/изтриване
            description: >-
                Изключва предупредителните диалози при изрязване/изтриване на повече от
                100 обекта.

        lowQualityMapResources:
            title: Нискокачествени ресурси на картата
            description: >-
                Опростява изобразяването на ресурсите на картата при увеличение, за да
                подобри производителността. Дори изглежда по-чисто, затова го пробвайте!

        disableTileGrid:
            title: Изключи мрежата
            description: >-
                Изключването на мрежата от плочки може да помогне за производителността.
                Освен това играта изглежда по-чисто!

        clearCursorOnDeleteWhilePlacing:
            title: Изчисти курсора при десен бутон
            description: >-
                Включено по подразбиране, изчиства курсора при десен бутон, докато имате
                избрана сграда за поставяне. Ако е изключено, можете да триете сгради с
                десен бутон, докато поставяте сграда.

        lowQualityTextures:
            title: Нискокачествени текстури (Грозни)
            description: >-
                Използва нискокачествени текстури за по-добра производителност. Това ще
                направи играта доста грозна!

        displayChunkBorders:
            title: Показвай границите на чънковете
            description: >-
                Играта е разделена на чънкове от 16x16 плочки; ако тази настройка е
                включена, се показват границите на всеки чънк.

        pickMinerOnPatch:
            title: Избирай екстрактор върху ресурсно поле
            description: >-
                Включено по подразбиране, избира екстрактора, ако използвате пипетата,
                докато сте върху ресурсно поле.

        simplifiedBelts:
            title: Опростени ленти (Грозни)
            description: >-
                Не изобразява предметите върху лентите, освен при посочване, за да
                спести производителност. Не препоръчвам да играете с тази настройка,
                ако не ви е абсолютно необходима.

        enableMousePan:
            title: Преместване по ръба на екрана
            description: >-
                Позволява преместване на картата чрез движение на курсора към ръбовете
                на екрана. Скоростта зависи от настройката за скорост на движение.

        zoomToCursor:
            title: Мащабиране към курсора
            description: >-
                Ако е активирано, мащабирането ще се случва към позицията на мишката,
                иначе към центъра на екрана.

        mapResourcesScale:
            title: Размер на ресурсите на картата
            description: >-
                Контролира размера на формите при изглед на картата (при отдалечаване).

        shapeTooltipAlwaysOn:
            title: Подсказка за форма - винаги показвай
            description: >-
                Дали подсказката за форма винаги да се показва при посочване на сгради,
                вместо да се задържа 'ALT'.

