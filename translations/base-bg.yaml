global:
    loading: Зареждане...
    error: Грешка
    loggingIn: Влизане...

    loadingResources: Изтегляне на допълнителни ресурси (<percentage> %)

    # How big numbers are rendered, e.g. "10,000"
    thousandsDivider: ","

    # What symbol to use to separate the integer part from the fractional part of a number, e.g. "0.4"
    decimalSeparator: "."

    # The suffix for large numbers, e.g. 1.3k, 400.2M, etc.
    suffix:
        thousands: k
        millions: M
        billions: B
        trillions: T

    # Shown for infinitely big numbers
    infinite: ∞

    time:
        # Used for formatting past time dates
        oneSecondAgo: преди една секунда
        xSecondsAgo: преди <x> секунди
        oneMinuteAgo: преди една минута
        xMinutesAgo: преди <x> минути
        oneHourAgo: преди един час
        xHoursAgo: преди <x> часа
        oneDayAgo: преди един ден
        xDaysAgo: преди <x> дни

        # Short formats for times, e.g. '5h 23m'
        secondsShort: <seconds>с
        minutesAndSecondsShort: <minutes>м <seconds>с
        hoursAndMinutesShort: <hours>ч <minutes>м

        xMinutes: <x> минути

    keys:
        tab: TAB
        control: CTRL
        alt: ALT
        escape: ESC
        shift: SHIFT
        space: SPACE

mainMenu:
    play: Играй
    continue: Продължи
    newGame: Нова игра
    importSavegame: Импортиране
    helpTranslate: Помогни с превода!
    noActiveSavegames: Няма активни записани игри - Натисни Играй, за да започнеш нова игра!

    savegameLevel: Ниво <x>
    savegameLevelUnknown: Ниво ?
    savegameUnnamed: Без име

    mods:
        warningPuzzleDLC: >-
            Играенето на Puzzle DLC не е възможно с модове. Моля, деактивирайте
            всички модове, за да играете DLC-то.

