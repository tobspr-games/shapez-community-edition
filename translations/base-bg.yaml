about:
    title: За тази игра
    body: >-
        Тази игра е с отворен код и е разработена от <a
        href="https://github.com/tobspr" target="_blank">Tobias Springer</a> (това
        съм аз).<br><br>

        Ако искате да допринесете, вижте <a href="<githublink>"
        target="_blank">shapez в GitHub</a>.<br><br>

        Тази игра нямаше да е възможна без страхотната Discord общност около
        игрите ми - наистина трябва да се присъедините към <a href="<discordlink>"
        target="_blank">Discord сървъра</a>!<br><br>

        Саундтракът е създаден от <a href="https://soundcloud.com/pettersumelius"
        target="_blank">Peppsen</a> - той е страхотен.<br><br>

        И накрая, огромни благодарности към най-добрия ми приятел <a
        href="https://github.com/niklas-dahl" target="_blank">Niklas</a> - без
        нашите Factorio сесии тази игра никога нямаше да съществува.

